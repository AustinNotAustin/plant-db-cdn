services:
  mock-cdn:
    build: .
    container_name: mock-cdn
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - .:/app
      - ./.env:/app/.env
      - ./s3_inbox:/app/s3_inbox
      - ./s3_quarantine:/app/s3_quarantine
      - ./s3_longterm:/app/s3_longterm
    environment:
      - PORT=${PORT}
    networks:
      - plant-db-network

networks:
  plant-db-network:
    name: plant-db_default
    external: true
